<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archive — HEGEMONIKON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C; --gold-light: #E8C96A; --gold-dim: #8A6E30;
      --dark: #080808; --dark-mid: #111111; --dark-card: #181818;
      --dark-border: #2A2A2A; --text: #E8E0D0; --text-muted: #7A7060; --text-dim: #4A4438;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); color:var(--text); font-family:'Crimson Text',Georgia,serif; min-height:100vh; overflow-x:hidden; }

    .menu-toggle { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--dark-card); border:1px solid var(--dark-border); color:var(--gold); width:44px; height:44px; border-radius:4px; cursor:pointer; font-size:1.2rem; align-items:center; justify-content:center; }
    #sidebar { width:240px; min-height:100vh; background:var(--dark-mid); border-right:1px solid var(--dark-border); position:fixed; top:0; left:0; display:flex; flex-direction:column; padding:0 0 30px 0; z-index:100; transition:transform 0.3s ease; }
    #sidebar-logo { padding:28px 20px 24px; border-bottom:1px solid var(--dark-border); text-align:center; }
    #sidebar-logo .logo-symbol { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:900; color:var(--gold); letter-spacing:0.15em; display:block; }
    #sidebar-logo .logo-sub { font-family:'Montserrat',sans-serif; font-size:0.6rem; color:var(--text-muted); letter-spacing:0.25em; text-transform:uppercase; margin-top:4px; display:block; }
    #sidebar-logo .logo-handle { font-family:'Montserrat',sans-serif; font-size:0.55rem; color:var(--text-dim); letter-spacing:0.1em; margin-top:6px; display:block; }
    nav { padding:20px 0; flex:1; }
    nav a { display:flex; align-items:center; gap:10px; padding:10px 20px; color:var(--text-muted); text-decoration:none; font-family:'Montserrat',sans-serif; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; transition:all 0.2s; border-left:2px solid transparent; }
    nav a:hover, nav a.active { color:var(--gold); border-left-color:var(--gold); background:rgba(201,168,76,0.05); }
    .sidebar-footer { padding:20px; border-top:1px solid var(--dark-border); font-family:'Montserrat',sans-serif; font-size:0.55rem; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; text-align:center; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:99; }
    .sidebar-overlay.active { display:block; }
    #main { margin-left:240px; }

    /* HEADER */
    .page-header { padding:60px 60px 40px; border-bottom:1px solid var(--dark-border); }
    .page-header-label { font-family:'Montserrat',sans-serif; font-size:0.55rem; letter-spacing:0.35em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:12px; }
    .page-header h1 { font-family:'Cinzel',serif; font-size:clamp(1.8rem, 4vw, 3rem); font-weight:900; color:var(--gold); letter-spacing:0.1em; margin-bottom:12px; }
    .page-header-sub { font-family:'Crimson Text',serif; font-size:1.05rem; font-style:italic; color:var(--text-muted); }

    /* TOOLBAR */
    .toolbar { padding:24px 60px; border-bottom:1px solid var(--dark-border); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .search-input { background:var(--dark-card); border:1px solid var(--dark-border); color:var(--text); font-family:'Crimson Text',serif; font-size:0.95rem; padding:10px 16px; outline:none; transition:border-color 0.2s; width:240px; }
    .search-input:focus { border-color:var(--gold-dim); }
    .search-input::placeholder { color:var(--text-dim); font-style:italic; }
    .filter-btn { font-family:'Montserrat',sans-serif; font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); background:var(--dark-card); border:1px solid var(--dark-border); padding:10px 16px; cursor:pointer; transition:all 0.2s; }
    .filter-btn:hover, .filter-btn.active { color:var(--gold); border-color:var(--gold-dim); background:rgba(201,168,76,0.05); }
    .toolbar-spacer { flex:1; }
    .export-btn { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-dim); background:transparent; border:1px solid rgba(201,168,76,0.2); padding:10px 20px; cursor:pointer; transition:all 0.2s; }
    .export-btn:hover { color:var(--gold); border-color:var(--gold); }
    .entry-count { font-family:'Montserrat',sans-serif; font-size:0.55rem; color:var(--text-dim); letter-spacing:0.12em; text-transform:uppercase; }

    /* ENTRIES LIST */
    .entries-container { padding:0; }

    .entry-card {
      border-bottom: 1px solid var(--dark-border);
      transition: background 0.2s;
      cursor: pointer;
    }
    .entry-card:hover { background:rgba(201,168,76,0.02); }

    .entry-card-header {
      padding: 24px 60px 0;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .entry-date {
      font-family:'Cinzel',serif;
      font-size:0.65rem;
      color:var(--gold-dim);
      letter-spacing:0.15em;
      min-width:140px;
    }

    .entry-mastery-badge {
      font-family:'Montserrat',sans-serif;
      font-size:0.5rem;
      letter-spacing:0.15em;
      color:var(--text-dim);
      text-transform:uppercase;
      background:var(--dark-card);
      border:1px solid var(--dark-border);
      padding:3px 10px;
    }

    .entry-triggers {
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      flex:1;
    }

    .entry-trigger-tag {
      font-family:'Montserrat',sans-serif;
      font-size:0.45rem;
      letter-spacing:0.1em;
      color:var(--text-dim);
      background:var(--dark-card);
      border:1px solid var(--dark-border);
      padding:2px 8px;
      text-transform:uppercase;
    }

    .entry-card-body {
      padding:16px 60px 24px;
      display:none;
    }

    .entry-card-body.open { display:block; }

    .entry-card-preview {
      padding:0 60px 20px;
      font-family:'Crimson Text',serif;
      font-size:0.95rem;
      font-style:italic;
      color:var(--text-muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .entry-q {
      margin-bottom:20px;
    }

    .entry-q-label {
      font-family:'Montserrat',sans-serif;
      font-size:0.5rem;
      letter-spacing:0.2em;
      color:var(--gold-dim);
      text-transform:uppercase;
      margin-bottom:6px;
    }

    .entry-q-text {
      font-family:'Crimson Text',serif;
      font-size:1rem;
      color:var(--text);
      line-height:1.65;
    }

    .entry-wisdom {
      background:rgba(201,168,76,0.04);
      border-left:2px solid var(--gold-dim);
      padding:12px 16px;
      margin-top:16px;
    }

    .entry-wisdom-label {
      font-family:'Montserrat',sans-serif;
      font-size:0.45rem;
      letter-spacing:0.2em;
      color:var(--gold-dim);
      text-transform:uppercase;
      margin-bottom:6px;
    }

    .entry-wisdom-text {
      font-family:'Crimson Text',serif;
      font-size:0.95rem;
      font-style:italic;
      color:var(--text-muted);
    }

    /* EMPTY STATE */
    .empty-state {
      padding:80px 60px;
      text-align:center;
    }

    .empty-state-title {
      font-family:'Cinzel',serif;
      font-size:0.8rem;
      letter-spacing:0.2em;
      color:var(--gold-dim);
      text-transform:uppercase;
      margin-bottom:16px;
    }

    .empty-state-text {
      font-family:'Crimson Text',serif;
      font-size:1.05rem;
      font-style:italic;
      color:var(--text-dim);
      margin-bottom:32px;
    }

    .btn-primary {
      font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase;
      color:var(--dark); background:var(--gold); border:none; padding:14px 32px;
      cursor:pointer; text-decoration:none; display:inline-block; transition:all 0.2s;
    }
    .btn-primary:hover { background:var(--gold-light); transform:translateY(-1px); }

    @media (max-width:768px) {
      .menu-toggle { display:flex; }
      #sidebar { transform:translateX(-100%); width:280px; }
      #sidebar.open { transform:translateX(0); }
      #main { margin-left:0; }
      .page-header { padding:70px 24px 32px; }
      .toolbar { padding:16px 24px; }
      .search-input { width:100%; }
      .entry-card-header { padding:20px 24px 0; flex-wrap:wrap; }
      .entry-card-preview { padding:0 24px 16px; }
      .entry-card-body { padding:16px 24px 20px; }
    }
  </style>
  <script src="https://macdubh28.github.io/dashboard/config-loader.js"></script>
</head>
<body data-platform="hegemonikon">

<button class="menu-toggle" id="menuToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside id="sidebar">
  <div id="sidebar-logo">
    <span class="logo-symbol">HEGEMONIKON</span>
    <span class="logo-sub">Journal Stoïcien</span>
    <span class="logo-handle">@AigleRoyal28</span>
  </div>
  <nav>
    <a href="index.html">⚖ Tableau de Bord</a>
    <a href="matin.html">☀ Rituel du Matin</a>
    <a href="journal.html">📖 Journal du Soir</a>
    <a href="archive.html" class="active">🗄 Archive</a>
    <a href="progres.html">⚡ Progression</a>
  </nav>
  <div class="sidebar-footer">La faculté directrice de l'âme</div>
</aside>

<main id="main">

  <div class="page-header">
    <p class="page-header-label">Mémoire de l'âme · Chaque entrée est une pierre posée</p>
    <h1>ARCHIVE</h1>
    <p class="page-header-sub">« Revenir sur ses pas, c'est aussi avancer. »</p>
  </div>

  <div class="toolbar">
    <input class="search-input" type="text" id="searchInput" placeholder="Rechercher dans les entrées...">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Tout</button>
    <button class="filter-btn" data-filter="high" onclick="setFilter('high', this)">Maîtrise ≥ 7</button>
    <button class="filter-btn" data-filter="low" onclick="setFilter('low', this)">Maîtrise ≤ 4</button>
    <button class="filter-btn" data-filter="month" onclick="setFilter('month', this)">Ce mois</button>
    <div class="toolbar-spacer"></div>
    <span class="entry-count" id="entryCount">0 entrées</span>
    <button class="export-btn" onclick="exportJSON()">↓ Exporter JSON</button>
  </div>

  <div class="entries-container" id="entriesContainer"></div>

</main>

<script>
// MOBILE
const menuToggle = document.getElementById('menuToggle');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
menuToggle.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); });
overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });

// DATA
let allEntries = JSON.parse(localStorage.getItem('hegemonikon_entries') || '[]');
let currentFilter = 'all';
let searchQuery = '';

// SEARCH
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

// FILTER
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// FILTER LOGIC
function getFiltered() {
  let filtered = [...allEntries];

  if (currentFilter === 'high') filtered = filtered.filter(e => e.mastery >= 7);
  if (currentFilter === 'low') filtered = filtered.filter(e => e.mastery && e.mastery <= 4);
  if (currentFilter === 'month') {
    const now = new Date();
    const monthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    filtered = filtered.filter(e => (e.date||'').startsWith(monthStr));
  }

  if (searchQuery) {
    filtered = filtered.filter(e =>
      (e.q1||'').toLowerCase().includes(searchQuery) ||
      (e.q2||'').toLowerCase().includes(searchQuery) ||
      (e.q3||'').toLowerCase().includes(searchQuery) ||
      (e.intention||'').toLowerCase().includes(searchQuery) ||
      (e.wisdom||'').toLowerCase().includes(searchQuery)
    );
  }

  return filtered;
}

// RENDER
function render() {
  const filtered = getFiltered();
  const container = document.getElementById('entriesContainer');
  document.getElementById('entryCount').textContent = filtered.length + ' entrée' + (filtered.length !== 1 ? 's' : '');

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <p class="empty-state-title">Aucune entrée</p>
        <p class="empty-state-text">Le silence précède toute sagesse. Commence ton premier examen du soir.</p>
        <a href="journal.html" class="btn-primary">Écrire maintenant</a>
      </div>
    `;
    return;
  }

  container.innerHTML = filtered.map((e, i) => {
    const d = new Date(e.timestamp || e.date);
    const dateLabel = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    const preview = e.q1 || e.q2 || e.q3 || '—';
    const triggers = (e.triggers || []).filter(t => t !== 'Aucun').slice(0, 4);

    return `
      <div class="entry-card" onclick="toggleEntry(${i})">
        <div class="entry-card-header">
          <span class="entry-date">${dateLabel.charAt(0).toUpperCase() + dateLabel.slice(1)}</span>
          ${e.mastery ? `<span class="entry-mastery-badge">Maîtrise ${e.mastery}/10</span>` : ''}
          <div class="entry-triggers">
            ${triggers.map(t => `<span class="entry-trigger-tag">${t}</span>`).join('')}
          </div>
        </div>
        <div class="entry-card-preview">${preview}</div>
        <div class="entry-card-body" id="body-${i}">
          ${e.q1 ? `<div class="entry-q"><div class="entry-q-label">En quoi ai-je été mauvais ?</div><div class="entry-q-text">${e.q1}</div></div>` : ''}
          ${e.q2 ? `<div class="entry-q"><div class="entry-q-label">En quoi ai-je été fort ?</div><div class="entry-q-text">${e.q2}</div></div>` : ''}
          ${e.q3 ? `<div class="entry-q"><div class="entry-q-label">Qu'ai-je laissé passer ?</div><div class="entry-q-text">${e.q3}</div></div>` : ''}
          ${e.intention ? `<div class="entry-q"><div class="entry-q-label">Intention du lendemain</div><div class="entry-q-text">${e.intention}</div></div>` : ''}
          ${e.wisdom ? `<div class="entry-wisdom"><div class="entry-wisdom-label">Sagesse retenue</div><div class="entry-wisdom-text">${e.wisdom}</div></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleEntry(i) {
  const body = document.getElementById(`body-${i}`);
  body.classList.toggle('open');
}

// EXPORT
function exportJSON() {
  const data = JSON.stringify(allEntries, null, 2);
  const blob = new Blob([data], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hegemonikon_archive_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
